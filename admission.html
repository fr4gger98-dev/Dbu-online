<style>
.admh-section, .admh-section *, .admh-section *::before, .admh-section *::after { box-sizing: border-box; }

.admh-section {
  padding: 70px 20px 60px;
  background: #ffffff;
  position: relative;
  overflow: hidden;
}
.admh-section::before {
  content: '';
  position: absolute; top: -100px; left: -120px;
  width: 360px; height: 360px; border-radius: 50%;
  background: radial-gradient(circle, rgba(26,111,212,.08) 0%, transparent 70%);
  animation: admhDrift 17s ease-in-out infinite;
  pointer-events: none;
}
.admh-section::after {
  content: '';
  position: absolute; bottom: -120px; right: -100px;
  width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(237,50,55,.06) 0%, transparent 70%);
  animation: admhDrift 21s ease-in-out infinite reverse;
  pointer-events: none;
}
@keyframes admhDrift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(22px,16px) scale(1.1); } }

.admh-head { text-align: center; max-width: 620px; margin: 0 auto 40px; position: relative; z-index: 1; }
.admh-label {
  display: inline-block; background: rgba(76,121,220,.1); color: #1a6fa8;
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; font-family: 'Inter', sans-serif;
}
.admh-title {
  font-family: 'Poppins', sans-serif; font-size: clamp(22px,3vw,34px); font-weight: 800;
  color: #02446c; line-height: 1.25; margin-bottom: 8px;
}
.admh-sub { font-size: 15px; color: #777; line-height: 1.7; font-family: 'Inter', sans-serif; }

.admh-scroll-hint {
  text-align: center; font-size: 12px; color: #9aa6bd; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.admh-scroll-hint svg { width: 14px; height: 14px; animation: admhArrowNudge 1.6s ease-in-out infinite; }
@keyframes admhArrowNudge { 0%,100% { transform: translateX(0); } 50% { transform: translateX(4px); } }

.admh-scroller {
  position: relative;
  max-width: 1180px;
  margin: 0 auto;
  z-index: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x proximity;
  padding: 34px 24px 20px;
  scrollbar-width: thin;
  scrollbar-color: #1a6fa8 #e6ecf7;
}
.admh-scroller::-webkit-scrollbar { height: 7px; }
.admh-scroller::-webkit-scrollbar-track { background: #e6ecf7; border-radius: 10px; }
.admh-scroller::-webkit-scrollbar-thumb { background: #1a6fa8; border-radius: 10px; }

.admh-track {
  position: relative;
  display: flex;
  flex-wrap: nowrap;
  align-items: flex-start;
  gap: 22px;
  width: max-content;
}

.admh-spine {
  position: absolute; left: 20px; right: 20px; top: 55px; height: 4px;
  background: #e6ecf7; border-radius: 4px; z-index: 0;
}
.admh-spine-fill {
  position: absolute; top: 0; left: 0; height: 100%; width: 0%;
  background: linear-gradient(90deg, #e63946, #1a6fa8, #0e8fa8, #2a9d8f, #e9c46a, #f4a261, #6a4c93);
  border-radius: 4px;
  transition: width .15s linear;
}

.admh-item {
  position: relative;
  z-index: 1;
  width: 230px;
  flex: 0 0 230px;
  scroll-snap-align: start;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity .5s cubic-bezier(.4,0,.2,1), transform .5s cubic-bezier(.4,0,.2,1);
}
.admh-item.in-view { opacity: 1; transform: translateY(0); }

.admh-dot {
  width: 40px; height: 40px; border-radius: 50%;
  background: #fff; border: 3px solid #d8e1f3; color: #9aa6bd;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 14px;
  margin: 0 auto 16px;
  transition: border-color .4s, color .4s, background .4s, box-shadow .4s, transform .4s cubic-bezier(.34,1.6,.64,1);
}
.admh-item.in-view .admh-dot {
  border-color: var(--c, #1a6fa8);
  color: #fff;
  background: var(--c, #1a6fa8);
  box-shadow: 0 6px 18px rgba(4,51,89,.18);
  transform: scale(1.08);
  animation: admhDotSettle .5s ease-out;
}
@keyframes admhDotSettle { 0% { transform: scale(.4) rotate(-25deg); } 60% { transform: scale(1.18) rotate(4deg); } 100% { transform: scale(1.08) rotate(0); } }

.admh-card {
  background: #fff; border: 1.5px solid #e6ecf7; border-radius: 14px;
  padding: 18px 16px; box-shadow: 0 4px 20px rgba(4,51,89,.06);
  height: 100%;
  transition: box-shadow .35s, transform .35s, border-color .35s;
}
.admh-item.in-view .admh-card { border-color: var(--c, #1a6fa8); box-shadow: 0 14px 34px rgba(4,51,89,.12); }
.admh-card:hover { transform: translateY(-3px); }

.admh-card-top { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; margin-bottom: 8px; }
.admh-card-icon {
  width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; color: #fff;
  background: var(--c, #1a6fa8);
  transform: scale(.5); opacity: 0;
  transition: transform .45s cubic-bezier(.34,1.6,.64,1) .15s, opacity .4s ease .15s;
}
.admh-item.in-view .admh-card-icon { transform: scale(1); opacity: 1; }
.admh-card-icon svg { width: 18px; height: 18px; }
.admh-card-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: #9aa6bd; }
.admh-card-title { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 14.5px; color: #02446c; line-height: 1.25; }
.admh-card-desc { font-size: 12.5px; color: #56657d; line-height: 1.6; text-align: center; }

.admh-end {
  width: 190px; flex: 0 0 190px;
  display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px;
  opacity: 0; transform: translateY(10px);
  transition: opacity .5s ease, transform .5s ease;
  z-index: 1;
}
.admh-end.in-view { opacity: 1; transform: translateY(0); }
.admh-end-dot {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #1a9e5b, #16895a);
  display: flex; align-items: center; justify-content: center; color: #fff;
  box-shadow: 0 8px 20px rgba(26,158,91,.3);
  margin-bottom: 6px;
}
.admh-end-dot svg { width: 18px; height: 18px; }
.admh-end-text strong { display: block; color: #02446c; font-family: 'Poppins', sans-serif; font-size: 14px; }
.admh-end-text span { font-size: 12px; color: #8a93a6; }

@media (max-width: 700px) {
  .admh-item { width: 200px; flex-basis: 200px; }
  .admh-end { width: 170px; flex-basis: 170px; }
  .admh-card { padding: 14px 12px; }
}
</style>

<section class="admh-section" id="admission">
  <div class="admh-head">
    <span class="admh-label">Admission Process</span>
    <h2 class="admh-title">Your Path to Enrolment</h2>
    <p class="admh-sub">Follow the journey from first enquiry to confirmed seat.</p>
  </div>

  <div class="admh-scroll-hint">
    Scroll to see all steps
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </div>

  <div class="admh-scroller" id="admhScroller">
    <div class="admh-track" id="admhTrack">
      <div class="admh-spine"><div class="admh-spine-fill" id="admhSpineFill"></div></div>
      <!-- items injected by JS -->
    </div>
  </div>
</section>

<script>
(function () {
  const scroller = document.getElementById('admhScroller');
  const track = document.getElementById('admhTrack');
  if (!scroller || !track) return;
  if (track.dataset.admhInit === '1') return;
  track.dataset.admhInit = '1';

  const ICONS = {
    enquiry: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 11-3.8-7.1L21 3l-1 4.4"/></svg>',
    counsel: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 8.2c1.2.3 2 1.4 2 2.7 0 1.1-.6 2.1-1.5 2.5M19.8 20c0-2.4-1.7-4.4-4-5.3"/></svg>',
    form: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h4"/></svg>',
    upload: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 16v3a2 2 0 002 2h12a2 2 0 002-2v-3"/></svg>',
    verify: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>',
    fee: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/><circle cx="7" cy="14.5" r="1.4" fill="currentColor" stroke="none"/></svg>',
    confirm: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13l5 5L20 6"/></svg>'
  };

  const STEPS = [
    { key: 'enquiry', color: '#e63946', title: 'Enquiry Generation',
      desc: "Submit a quick enquiry at dbuonline.in with your name, number and the program you're interested in." },
    { key: 'counsel', color: '#1a6fa8', title: 'Student Counselling',
      desc: 'An admission expert calls you within 24 hours to recommend the right program, fee plan and intake.' },
    { key: 'form', color: '#0e8fa8', title: 'Application Form',
      desc: 'Fill in the official application form and get your DEB ID registered against your chosen program.' },
    { key: 'upload', color: '#2a9d8f', title: 'Upload Documents',
      desc: 'Upload marksheets, ID proof and a recent photograph through the student portal.' },
    { key: 'verify', color: '#e9c46a', title: 'Document Verification',
      desc: "The admission cell reviews your documents and confirms eligibility — you're notified the moment it's approved." },
    { key: 'fee', color: '#f4a261', title: 'Fee Payment',
      desc: 'Pay via UPI, net banking, card, or an easy EMI plan. Instant receipt on payment.' },
    { key: 'confirm', color: '#6a4c93', title: 'Admission Confirmed',
      desc: 'Your official admission letter and LMS access are issued. Welcome aboard!' }
  ];

  STEPS.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'admh-item';
    item.style.setProperty('--c', s.color);
    item.innerHTML =
      '<div class="admh-dot">' + (i + 1) + '</div>' +
      '<div class="admh-card">' +
        '<div class="admh-card-top">' +
          '<div class="admh-card-icon">' + ICONS[s.key] + '</div>' +
          '<div>' +
            '<div class="admh-card-eyebrow">Step ' + (i + 1) + ' of ' + STEPS.length + '</div>' +
            '<div class="admh-card-title">' + s.title + '</div>' +
          '</div>' +
        '</div>' +
        '<p class="admh-card-desc">' + s.desc + '</p>' +
      '</div>';
    track.appendChild(item);
  });

  const endItem = document.createElement('div');
  endItem.className = 'admh-end';
  endItem.innerHTML =
    '<div class="admh-end-dot"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13l5 5L20 6"/></svg></div>' +
    '<div class="admh-end-text"><strong>You\'re all set 🎉</strong><span>From enquiry to confirmed seat.</span></div>';
  track.appendChild(endItem);

  const items = Array.from(track.querySelectorAll('.admh-item'));
  const spineFill = document.getElementById('admhSpineFill');

  function revealOnView() {
    if (!('IntersectionObserver' in window)) {
      items.forEach(r => r.classList.add('in-view'));
      endItem.classList.add('in-view');
      return;
    }
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          obs.unobserve(entry.target);
        }
      });
    }, { root: scroller, threshold: 0.5 });
    items.forEach(r => obs.observe(r));
    obs.observe(endItem);
  }

  function updateSpine() {
    const max = scroller.scrollWidth - scroller.clientWidth;
    const pct = max > 0 ? Math.max(0, Math.min(1, scroller.scrollLeft / max)) : 1;
    spineFill.style.width = (pct * 100) + '%';
  }

  let ticking = false;
  function onScroll() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => { updateSpine(); ticking = false; });
  }

  revealOnView();
  updateSpine();
  scroller.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', updateSpine);
})();
</script>
